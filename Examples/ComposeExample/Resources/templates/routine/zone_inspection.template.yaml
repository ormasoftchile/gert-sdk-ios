id: zone_inspection
version: 1
kind: routine
title: "Zone inspection"
description: "Recurring visual check of a zone, at the chosen priority level."

slots:
  - id: zone
    type: zone_ref
    required: true
    label: "Which area?"
  - id: cadence
    type: cadence
    required: true
    default: "7d"
    label: "How often?"
  - id: priority
    type: enum
    options: [low, medium, high]
    default: medium
    label: "Priority level"

toggles:
  - id: photo_evidence
    label: "Take a photo when done?"
    default: true

routine:
  label: "Zone inspection"
  zone: "{{zone}}"
  cadence:
    every: "{{cadence}}"
  evidence:
    when: photo_evidence
    type: photo
    prompt: "Photo evidencing {{priority}}-priority inspection of zone"
  tools:
    - location.read
