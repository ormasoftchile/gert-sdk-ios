id: gutter_clean
version: 1
kind: routine
title: "Clean gutters"
description: "Clear leaves and debris from the gutters of the chosen area."

slots:
  - id: zone
    type: zone_ref
    required: true
    label: "Which area?"
  - id: cadence
    type: cadence
    required: true
    default: "90d"
    label: "How often?"

toggles:
  - id: needs_ladder
    label: "Requires a ladder?"
    default: false
  - id: photo_evidence
    label: "Take a photo when done?"
    default: true

routine:
  label: "Clean gutters"
  zone: "{{zone}}"
  cadence:
    every: "{{cadence}}"
  evidence:
    when: photo_evidence
    type: photo
    prompt: "Photo of clean gutters"
  tools:
    - location.read
    - tool: notifications.local
      when: needs_ladder
      action: schedule
      args:
        title: "Bring the ladder"
        body: "This routine requires a ladder."
        delay: 0
    - tool: camera.capture
      when: photo_evidence
      args:
        mode: photo
        quality: high
